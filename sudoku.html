<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sudoku Game</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1d2b64,#f8cdda);
font-family:sans-serif;
}

h1{
color:white;
margin-bottom:15px;
}

.board{
display:grid;
grid-template-columns:repeat(9,45px);
grid-template-rows:repeat(9,45px);
gap:2px;
background:#333;
padding:5px;
border-radius:10px;
}

.cell{
width:45px;
height:45px;
text-align:center;
font-size:18px;
border:none;
outline:none;
}

.cell:nth-child(3n){
border-right:2px solid black;
}

.row-3, .row-6{
border-bottom:2px solid black;
}

.prefilled{
background:#ddd;
font-weight:bold;
}

.correct{
background:#b9f6ca;
}

.wrong{
background:#ff8a80;
}

button{
margin-top:15px;
padding:8px 20px;
border:none;
border-radius:20px;
cursor:pointer;
background:#ff1744;
color:white;
}

button:hover{
opacity:0.8;
}
</style>
</head>
<body>

<h1>Sudoku</h1>
<div class="board" id="board"></div>
<button onclick="checkSolution()">Check Solution</button>
<button onclick="restart()">Restart</button>

<script>
const puzzle=[
[5,3,"","",7,"","","",""],
[6,"","",1,9,5,"","",""],
["",9,8,"","","","",6,""],
[8,"","","",6,"","","",3],
[4,"","",8,"",3,"","",1],
[7,"","","",2,"","","",6],
["",6,"","","","",2,8,""],
["","","",4,1,9,"","",5],
["","","","",8,"","",7,9]
];

const solution=[
[5,3,4,6,7,8,9,1,2],
[6,7,2,1,9,5,3,4,8],
[1,9,8,3,4,2,5,6,7],
[8,5,9,7,6,1,4,2,3],
[4,2,6,8,5,3,7,9,1],
[7,1,3,9,2,4,8,5,6],
[9,6,1,5,3,7,2,8,4],
[2,8,7,4,1,9,6,3,5],
[3,4,5,2,8,6,1,7,9]
];

const board=document.getElementById("board");

function createBoard(){
board.innerHTML="";
for(let r=0;r<9;r++){
for(let c=0;c<9;c++){
let input=document.createElement("input");
input.type="text";
input.maxLength="1";
input.classList.add("cell");

if(puzzle[r][c]!=""){
input.value=puzzle[r][c];
input.disabled=true;
input.classList.add("prefilled");
}else{
input.addEventListener("input",()=>{
validate(input,r,c);
});
}

if(r===2||r===5) input.classList.add("row-3");

board.appendChild(input);
}
}
}

function validate(input,r,c){
let value=input.value;
if(value===""){
input.classList.remove("correct","wrong");
return;
}
if(parseInt(value)===solution[r][c]){
input.classList.add("correct");
input.classList.remove("wrong");
}else{
input.classList.add("wrong");
input.classList.remove("correct");
}
}

function checkSolution(){
let inputs=document.querySelectorAll(".cell");
let index=0;
let correct=true;

for(let r=0;r<9;r++){
for(let c=0;c<9;c++){
if(!inputs[index].disabled){
if(parseInt(inputs[index].value)!==solution[r][c]){
correct=false;
}
}
index++;
}
}

if(correct){
alert("Sudoku Solved! 🎉");
}else{
alert("There are mistakes ❌");
}
}

function restart(){
createBoard();
}

createBoard();
</script>

</body>
</html>
