<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family:sans-serif;
color:white;
flex-direction:column;
}

h1{
margin-bottom:10px;
}

#scoreboard{
margin-bottom:15px;
font-size:18px;
}

.board{
display:grid;
grid-template-columns:repeat(3,120px);
grid-template-rows:repeat(3,120px);
gap:10px;
}

.cell{
background:rgba(255,255,255,0.1);
display:flex;
justify-content:center;
align-items:center;
font-size:48px;
cursor:pointer;
border-radius:15px;
transition:0.3s;
}

.cell:hover{
background:rgba(255,255,255,0.2);
transform:scale(1.05);
}

.winner{
background:#00c853 !important;
color:white;
}

button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:16px;
background:#ff4081;
color:white;
}

button:hover{
opacity:0.8;
}
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="scoreboard">X: 0 | O: 0</div>
<div class="board" id="board"></div>
<button onclick="restart()">Restart</button>

<script>
let board=["","","","","","","","",""];
let currentPlayer="X";
let gameActive=true;
let scoreX=0;
let scoreO=0;

const boardDiv=document.getElementById("board");
const scoreboard=document.getElementById("scoreboard");

function drawBoard(){
boardDiv.innerHTML="";
board.forEach((cell,index)=>{
let cellDiv=document.createElement("div");
cellDiv.className="cell";
cellDiv.innerText=cell;
cellDiv.addEventListener("click",()=>makeMove(index));
boardDiv.appendChild(cellDiv);
});
}

function makeMove(index){
if(board[index]!==""||!gameActive) return;

board[index]=currentPlayer;
drawBoard();

if(checkWinner()){
gameActive=false;
if(currentPlayer==="X") scoreX++;
else scoreO++;
updateScore();
highlightWinner();
setTimeout(()=>alert(currentPlayer+" Wins!"),100);
return;
}

if(!board.includes("")){
gameActive=false;
setTimeout(()=>alert("Draw!"),100);
return;
}

currentPlayer=currentPlayer==="X"?"O":"X";
}

function checkWinner(){
const wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

return wins.some(combo=>{
if(combo.every(i=>board[i]===currentPlayer)){
combo.forEach(i=>{
boardDiv.children[i].classList.add("winner");
});
return true;
}
return false;
});
}

function updateScore(){
scoreboard.innerText=`X: ${scoreX} | O: ${scoreO}`;
}

function restart(){
board=["","","","","","","","",""];
currentPlayer="X";
gameActive=true;
drawBoard();
}

drawBoard();
</script>

</body>
</html>
