<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pong Game</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000428,#004e92);
font-family:sans-serif;
color:white;
}

h1{
margin-bottom:10px;
}

#score{
margin-bottom:10px;
font-size:20px;
}

canvas{
background:#000;
border-radius:15px;
box-shadow:0 0 40px rgba(0,255,255,0.6);
}

button{
margin-top:15px;
padding:8px 20px;
border:none;
border-radius:20px;
cursor:pointer;
background:#ff1744;
color:white;
display:none;
}
button:hover{
opacity:0.8;
}
</style>
</head>
<body>

<h1>Pong Game</h1>
<div id="score">You: 0 | AI: 0</div>
<canvas id="game" width="700" height="400"></canvas>
<button id="restart">Restart</button>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const paddleWidth=10;
const paddleHeight=100;

let playerY=150;
let aiY=150;

let ballX=canvas.width/2;
let ballY=canvas.height/2;
let ballRadius=8;
let ballSpeedX=4;
let ballSpeedY=4;

let playerScore=0;
let aiScore=0;
let gameOver=false;

const scoreDiv=document.getElementById("score");
const restartBtn=document.getElementById("restart");

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp") playerY-=20;
if(e.key==="ArrowDown") playerY+=20;
});

function drawRect(x,y,w,h,color){
ctx.fillStyle=color;
ctx.fillRect(x,y,w,h);
}

function drawBall(){
ctx.beginPath();
ctx.arc(ballX,ballY,ballRadius,0,Math.PI*2);
ctx.fillStyle="#00ffff";
ctx.fill();
ctx.closePath();
}

function resetBall(){
ballX=canvas.width/2;
ballY=canvas.height/2;
ballSpeedX=-ballSpeedX;
}

function update(){
if(gameOver) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

drawRect(0,playerY,paddleWidth,paddleHeight,"#00ff00");
drawRect(canvas.width-paddleWidth,aiY,paddleWidth,paddleHeight,"#ff1744");

drawBall();

ballX+=ballSpeedX;
ballY+=ballSpeedY;

if(ballY+ballRadius>canvas.height || ballY-ballRadius<0){
ballSpeedY=-ballSpeedY;
}

if(ballX-ballRadius< paddleWidth &&
ballY>playerY && ballY<playerY+paddleHeight){
ballSpeedX=-ballSpeedX;
}

if(ballX+ballRadius> canvas.width-paddleWidth &&
ballY>aiY && ballY<aiY+paddleHeight){
ballSpeedX=-ballSpeedX;
}

if(ballX<0){
aiScore++;
resetBall();
}

if(ballX>canvas.width){
playerScore++;
resetBall();
}

scoreDiv.innerText=`You: ${playerScore} | AI: ${aiScore}`;

aiY += ((ballY - (aiY + paddleHeight/2))) * 0.08
